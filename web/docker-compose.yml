# Local dev stack for the WEB version only.
# Runs fully isolated from the mobile stack (root docker-compose.yml).
#
#   frontend → http://localhost:8080
#   backend  → http://localhost:8000/api/docs/
services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: inclusion_web
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_pass
    volumes:
      - web_postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inclusion_web"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DEBUG: "True"
      DATABASE_URL: postgis://admin:secret_pass@db:5432/inclusion_web
      SECRET_KEY: dev-web-secret-key-change-me
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  web_postgres_data:
