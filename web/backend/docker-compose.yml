services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_DB=inclusion_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:    
      - .env
    depends_on:
      - db

volumes:
  postgres_data: