name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Frontend ----------
  frontend:
    name: Frontend build + Docker image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front_web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front_web/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check and build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://backend-inclusion.onrender.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./front_web
          file: ./front_web/Dockerfile
          push: false
          tags: digital-inclusion-web:ci
          build-args: |
            VITE_API_BASE_URL=https://backend-inclusion.onrender.com

  # ---------- Backend ----------
  backend:
    name: Backend Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: digital-inclusion-backend:ci
