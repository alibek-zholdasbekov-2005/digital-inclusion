name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        cd web/backend
        pip install -r requirements.txt
    - name: Run Linting
      run: |
        cd web/backend
        echo "Linting backend..."

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install Dependencies
      run: |
        cd web/frontend
        npm install
    - name: Build Frontend
      run: |
        cd web/frontend
        npm run build

  build-docker-images:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Backend Image
      run: docker build ./web/backend -t web-backend:latest
    - name: Build Frontend Image
      run: docker build ./web/frontend -t web-frontend:latest
