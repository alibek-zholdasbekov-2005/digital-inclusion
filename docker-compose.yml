# Mobile stack — backend only (shared by Android app).
# For the WEB stack, use ./web/docker-compose.yml instead:
#   docker compose -f web/docker-compose.yml up --build

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: inclusion_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inclusion_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    environment:
      DEBUG: "True"
      DATABASE_URL: postgis://admin:secret_pass@db:5432/inclusion_db
      SECRET_KEY: dev-compose-secret-key-change-me
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
